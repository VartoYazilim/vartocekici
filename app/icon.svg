<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0F1115"/>
  <rect x="2" y="2" width="60" height="60" rx="11" fill="none" stroke="#A3E635" stroke-width="1.5" opacity="0.35"/>
  <!-- Stacked "7 / 24" — composes the same mark while staying square -->
  <text x="14" y="36" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="34" font-weight="900" fill="#A3E635" letter-spacing="-2">7</text>
  <line x1="6" y1="50" x2="58" y2="14" stroke="#A3E635" stroke-width="3" stroke-linecap="round"/>
  <text x="22" y="58" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="34" font-weight="900" fill="#A3E635" letter-spacing="-2">24</text>
</svg>
