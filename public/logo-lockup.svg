<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Varto Çekici">
  <title>Varto Çekici — 7/24 Yol Yardım</title>
  <defs>
    <linearGradient id="lockupBadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(0 0)">
    <path
      d="M20 4 L44 4 L60 20 L60 44 L44 60 L20 60 L4 44 L4 20 Z"
      fill="url(#lockupBadge)"
      stroke="#0B1220"
      stroke-width="2"
      stroke-linejoin="round"
    />
    <g fill="none" stroke="#0B1220" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 20 L32 42 L48 20"/>
      <path d="M32 42 Q32 50 38 50 Q44 50 44 46"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(76 0)" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, sans-serif">
    <text x="0" y="30" font-size="22" font-weight="800" letter-spacing="0.5">VARTO</text>
    <text x="0" y="52" font-size="22" font-weight="800" letter-spacing="0.5" fill="#F59E0B">ÇEKİCİ</text>
  </g>

  <!-- Tagline pip -->
  <g transform="translate(208 0)">
    <rect x="0" y="20" width="68" height="24" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
    <text x="34" y="36" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#FBBF24">7/24 AÇIK</text>
  </g>
</svg>
