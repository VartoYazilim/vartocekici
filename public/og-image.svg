<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1115"/>
      <stop offset="100%" stop-color="#1A1D24"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#A3E635" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A3E635" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="#27272A" stroke-width="1" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Hi-vis stripe accent near bottom -->
  <g opacity="0.18">
    <rect x="-200" y="572" width="1800" height="34" fill="#A3E635" transform="rotate(-1.5 600 588)"/>
  </g>

  <!-- 7/24 mark (left half) -->
  <g transform="translate(80 200)">
    <text x="0" y="190" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="220" font-weight="900" fill="#A3E635" letter-spacing="-8">7</text>
    <line x1="106" y1="220" x2="166" y2="6" stroke="#A3E635" stroke-width="16" stroke-linecap="round"/>
    <text x="158" y="190" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="220" font-weight="900" fill="#A3E635" letter-spacing="-8">24</text>
    <text x="0" y="232" font-family="'Helvetica Neue', system-ui, sans-serif" font-size="20" font-weight="800" fill="#FAFAFA" letter-spacing="6">VARTO ÇEKİCİ</text>
  </g>

  <!-- Right column: kicker + coverage + phone -->
  <g transform="translate(640 150)" font-family="'Helvetica Neue', system-ui, sans-serif">
    <!-- Kicker -->
    <g>
      <rect x="0" y="0" width="14" height="3" fill="#A3E635"/>
      <text x="26" y="6" font-size="18" font-weight="700" fill="#BEF264" letter-spacing="4">YOL YARDIM · 7/24</text>
    </g>

    <!-- Headline -->
    <text x="0" y="68" font-family="'Inter Tight', system-ui, sans-serif" font-size="60" font-weight="900" fill="#FAFAFA" letter-spacing="-1">Muş Varto</text>
    <text x="0" y="124" font-family="'Inter Tight', system-ui, sans-serif" font-size="60" font-weight="900" fill="#FAFAFA" letter-spacing="-1">Oto Kurtarma</text>

    <!-- Coverage strip -->
    <text x="0" y="170" font-size="22" font-weight="500" fill="#A1A1AA">Hınıs · Bulanık · Karlıova · D300</text>

    <!-- Phone CTA -->
    <g transform="translate(0 220)">
      <rect x="0" y="0" width="460" height="86" rx="14" fill="#A3E635"/>
      <text x="28" y="58" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="38" font-weight="900" fill="#0F1115" letter-spacing="0.5">0 553 181 57 91</text>
    </g>

    <!-- Domain -->
    <text x="0" y="338" font-size="18" font-weight="700" fill="#71717A" letter-spacing="3">VARTOCEKICI.COM</text>
  </g>
</svg>
