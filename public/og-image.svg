<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="badgeOg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative chevron stripes (warning/recovery vibe) -->
  <g opacity="0.06">
    <rect x="-200" y="540" width="1800" height="40" fill="#F59E0B" transform="rotate(-2 600 560)"/>
  </g>

  <!-- Mark -->
  <g transform="translate(80 200) scale(3.6)">
    <path
      d="M20 4 L44 4 L60 20 L60 44 L44 60 L20 60 L4 44 L4 20 Z"
      fill="url(#badgeOg)"
      stroke="#0B1220"
      stroke-width="2"
      stroke-linejoin="round"
    />
    <g fill="none" stroke="#0B1220" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 20 L32 42 L48 20"/>
      <path d="M32 42 Q32 50 38 50 Q44 50 44 46"/>
    </g>
  </g>

  <!-- Text block -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
    <!-- Kicker -->
    <g transform="translate(380 175)">
      <rect x="0" y="0" width="14" height="3" fill="#F59E0B"/>
      <text x="26" y="6" font-size="20" font-weight="700" fill="#FBBF24" letter-spacing="3">7/24 YOL YARDIM</text>
    </g>

    <!-- Title -->
    <text x="380" y="245" font-size="76" font-weight="900" fill="#F8FAFC" letter-spacing="-1">VARTO ÇEKİCİ</text>

    <!-- Subtitle -->
    <text x="380" y="305" font-size="32" font-weight="500" fill="#CBD5E1">Muş Varto · Hınıs · ve tüm çevre bölgeler</text>

    <!-- Service strip -->
    <g transform="translate(380 360)" fill="#94A3B8" font-size="22" font-weight="500">
      <text x="0" y="20">Oto Kurtarma · Off-Road · Akü · Lastik · Yakıt · Kilit</text>
    </g>

    <!-- Phone CTA -->
    <g transform="translate(380 430)">
      <rect x="0" y="0" width="440" height="80" rx="14" fill="#F59E0B"/>
      <text x="32" y="52" font-size="34" font-weight="800" fill="#0B1220" letter-spacing="0.5">0 553 181 57 91</text>
    </g>

    <!-- Domain -->
    <text x="380" y="555" font-size="22" font-weight="600" fill="#64748B" letter-spacing="2">VARTOCEKICI.COM</text>
  </g>
</svg>
